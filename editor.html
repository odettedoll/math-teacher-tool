<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VI-ZONE 에디터</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── 상단 바 ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      height: 44px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      z-index: 100;
    }

    #topbar .logo {
      font-weight: 700;
      font-size: 14px;
      color: #e94560;
      letter-spacing: 1px;
      margin-right: 8px;
      white-space: nowrap;
    }

    /* 파일 탭 */
    #file-tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
    }
    #file-tabs::-webkit-scrollbar { display: none; }

    .file-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      border: 1px solid transparent;
      border-bottom: none;
      transition: all 0.15s;
      color: #888;
      background: transparent;
      user-select: none;
    }
    .file-tab:hover { background: #1e2a45; color: #ccc; }
    .file-tab.active {
      background: #1e3a5f;
      color: #fff;
      border-color: #0f3460;
      position: relative;
    }
    .file-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 1px;
      background: #1e3a5f;
    }
    .file-tab .tab-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #e94560;
      display: none;
    }
    .file-tab.modified .tab-dot { display: block; }

    .tab-icon { font-size: 11px; opacity: 0.7; }

    /* 우측 버튼들 */
    #topbar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-save {
      background: #0f3460;
      color: #7ecfff;
      border: 1px solid #1a5276;
    }
    .btn-save:hover { background: #1a5276; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-commit {
      background: #1a472a;
      color: #6fcf97;
      border: 1px solid #27ae60;
    }
    .btn-commit:hover { background: #27ae60; color: #fff; }
    .btn-commit:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-preview-toggle {
      background: #2c2c54;
      color: #a29bfe;
      border: 1px solid #5f27cd;
    }
    .btn-preview-toggle:hover { background: #5f27cd; color: #fff; }

    /* ── 메인 영역 ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* 에디터 패널 */
    #editor-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      border-right: 3px solid #0f3460;
      position: relative;
    }

    #editor-panel .panel-label {
      font-size: 10px;
      color: #555;
      padding: 4px 10px;
      background: #131929;
      border-bottom: 1px solid #0f3460;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .CodeMirror {
      height: 100%;
      font-size: 13px;
      line-height: 1.6;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }
    .CodeMirror-scroll { height: 100%; }

    #cm-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 리사이저 */
    #resizer {
      width: 5px;
      background: #0f3460;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #resizer:hover, #resizer.dragging { background: #e94560; }

    /* 미리보기 패널 */
    #preview-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    #preview-panel .panel-label {
      font-size: 10px;
      color: #555;
      padding: 4px 10px;
      background: #131929;
      border-bottom: 1px solid #0f3460;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #preview-frame {
      flex: 1;
      border: none;
      background: #fff;
      width: 100%;
    }

    /* 하단 상태바 */
    #statusbar {
      height: 24px;
      background: #0d1b2a;
      border-top: 1px solid #0f3460;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      font-size: 11px;
      color: #556;
      flex-shrink: 0;
    }
    #statusbar span { color: #778; }
    #statusbar .status-ok { color: #6fcf97; }
    #statusbar .status-modified { color: #f9ca24; }
    #statusbar .status-saving { color: #7ecfff; }
    #statusbar .status-error { color: #e94560; }

    /* 토스트 알림 */
    #toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e3a5f;
      border: 1px solid #0f3460;
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: #27ae60; background: #1a472a; }
    #toast.error { border-color: #e94560; background: #3d0000; }

    /* GitHub 설정 모달 */
    #gh-modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    #gh-modal-bg.open { display: flex; }

    #gh-modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 28px 32px;
      width: 420px;
      max-width: 95vw;
    }
    #gh-modal h2 { font-size: 16px; margin-bottom: 6px; color: #7ecfff; }
    #gh-modal p { font-size: 12px; color: #778; margin-bottom: 20px; }
    #gh-modal label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
    #gh-modal input {
      width: 100%;
      background: #0d1b2a;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 8px 10px;
      color: #fff;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
    }
    #gh-modal input:focus { border-color: #7ecfff; }
    #gh-modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* 패널 숨김 */
    #editor-panel.hidden, #preview-panel.hidden { display: none; }
    #resizer.hidden { display: none; }
  </style>
</head>
<body>

<!-- 상단 바 -->
<div id="topbar">
  <div class="logo">VI-ZONE</div>

  <div id="file-tabs"></div>

  <div id="topbar-actions">
    <button class="btn btn-save" id="btn-save" onclick="saveFile()" title="파일 저장 (Ctrl+S)">
      💾 저장
    </button>
    <button class="btn btn-commit" id="btn-commit" onclick="commitAndPush()" title="GitHub에 커밋 & 푸시">
      ⬆ GitHub 업로드
    </button>
    <button class="btn btn-preview-toggle" onclick="toggleLayout()" title="레이아웃 전환">
      ⇄ 레이아웃
    </button>
    <button class="btn" style="background:#2a1a2e;color:#f8a5c2;border:1px solid #6c3483;"
      onclick="openGhModal()" title="GitHub 설정">⚙ 설정</button>
  </div>
</div>

<!-- 메인 -->
<div id="main">
  <div id="editor-panel">
    <div class="panel-label">코드 에디터</div>
    <div id="cm-wrap">
      <textarea id="cm-editor"></textarea>
    </div>
  </div>
  <div id="resizer"></div>
  <div id="preview-panel">
    <div class="panel-label">
      <span>미리보기</span>
      <span id="preview-file-name" style="color:#aaa;font-size:11px;"></span>
    </div>
    <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
  </div>
</div>

<!-- 하단 상태바 -->
<div id="statusbar">
  <span id="st-file">파일 없음</span>
  <span id="st-status" class="status-ok">준비</span>
  <span id="st-cursor">Ln 1, Col 1</span>
  <span id="st-gh" style="margin-left:auto;"></span>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<!-- GitHub 설정 모달 -->
<div id="gh-modal-bg">
  <div id="gh-modal">
    <h2>⚙ GitHub 설정</h2>
    <p>GitHub API로 파일을 직접 저장하려면 아래 정보를 입력하세요.<br>토큰은 이 브라우저에만 저장됩니다.</p>
    <label>GitHub Personal Access Token</label>
    <input id="gh-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <label>저장소 (owner/repo)</label>
    <input id="gh-repo" type="text" placeholder="odettedoll/math-teacher-tool" value="odettedoll/math-teacher-tool">
    <label>브랜치</label>
    <input id="gh-branch" type="text" placeholder="main" value="main">
    <div class="modal-actions">
      <button class="btn" style="background:#2a1a2e;color:#aaa;border:1px solid #444;" onclick="closeGhModal()">취소</button>
      <button class="btn btn-save" onclick="saveGhConfig()">저장</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
// 파일 목록 (GitHub 저장소 구조와 동일)
// ──────────────────────────────────────────
const FILES = [
  { name: 'home.html',       path: 'home.html',      icon: '🏠', mode: 'htmlmixed' },
  { name: 'lesson.html',     path: 'lesson.html',    icon: '📚', mode: 'htmlmixed' },
  { name: 'question.html',   path: 'question.html',  icon: '✏️',  mode: 'htmlmixed' },
  { name: 'tool.html',       path: 'tool.html',      icon: '🛠',  mode: 'htmlmixed' },
  { name: 'styles.css',      path: 'css/styles.css', icon: '🎨', mode: 'css' },
  { name: 'lesson.css',      path: 'css/lesson.css', icon: '🎨', mode: 'css' },
  { name: 'question.css',    path: 'css/question.css',icon:'🎨', mode: 'css' },
  { name: 'tool.css',        path: 'css/tool.css',   icon: '🎨', mode: 'css' },
  { name: 'script.js',       path: 'js/script.js',   icon: '⚡', mode: 'javascript' },
  { name: 'lesson.js',       path: 'js/lesson.js',   icon: '⚡', mode: 'javascript' },
  { name: 'question.js',     path: 'js/question.js', icon: '⚡', mode: 'javascript' },
  { name: 'tool.js',         path: 'js/tool.js',     icon: '⚡', mode: 'javascript' },
];

// ──────────────────────────────────────────
// 상태
// ──────────────────────────────────────────
let currentFile = null;
let fileCache = {};       // path → { content, sha }
let modifiedFiles = {};   // path → true
let editor = null;
let layout = 'split';     // 'split' | 'editor' | 'preview'
let ghConfig = {};

// ──────────────────────────────────────────
// GitHub 설정
// ──────────────────────────────────────────
function loadGhConfig() {
  ghConfig = {
    token:  localStorage.getItem('gh_token')  || '',
    repo:   localStorage.getItem('gh_repo')   || 'odettedoll/math-teacher-tool',
    branch: localStorage.getItem('gh_branch') || 'main',
  };
}
function saveGhConfig() {
  ghConfig.token  = document.getElementById('gh-token').value.trim();
  ghConfig.repo   = document.getElementById('gh-repo').value.trim();
  ghConfig.branch = document.getElementById('gh-branch').value.trim();
  localStorage.setItem('gh_token',  ghConfig.token);
  localStorage.setItem('gh_repo',   ghConfig.repo);
  localStorage.setItem('gh_branch', ghConfig.branch);
  closeGhModal();
  updateGhStatus();
  toast('설정이 저장되었습니다', 'success');
}
function openGhModal() {
  document.getElementById('gh-token').value  = ghConfig.token;
  document.getElementById('gh-repo').value   = ghConfig.repo;
  document.getElementById('gh-branch').value = ghConfig.branch;
  document.getElementById('gh-modal-bg').classList.add('open');
}
function closeGhModal() {
  document.getElementById('gh-modal-bg').classList.remove('open');
}
function updateGhStatus() {
  const el = document.getElementById('st-gh');
  if (ghConfig.token) {
    el.innerHTML = `<span class="status-ok">● GitHub: ${ghConfig.repo}</span>`;
  } else {
    el.innerHTML = `<span class="status-error">● GitHub 미설정</span>`;
  }
}

// ──────────────────────────────────────────
// GitHub API
// ──────────────────────────────────────────
async function ghFetch(path, options = {}) {
  const url = `https://api.github.com/repos/${ghConfig.repo}/contents/${path}`;
  const res = await fetch(url, {
    ...options,
    headers: {
      'Authorization': `token ${ghConfig.token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

async function loadFileFromGitHub(filePath) {
  if (fileCache[filePath]) return fileCache[filePath];
  setStatus('불러오는 중...', 'saving');
  const data = await ghFetch(`${filePath}?ref=${ghConfig.branch}`);
  const content = atob(data.content.replace(/\n/g, ''));
  fileCache[filePath] = { content, sha: data.sha };
  setStatus('준비', 'ok');
  return fileCache[filePath];
}

async function saveFileToGitHub(filePath, content, sha) {
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const res = await ghFetch(filePath, {
    method: 'PUT',
    body: JSON.stringify({
      message: `✏️ [에디터] ${filePath} 수정`,
      content: encoded,
      sha,
      branch: ghConfig.branch,
    }),
  });
  return res.content.sha;
}

// ──────────────────────────────────────────
// 탭 렌더링
// ──────────────────────────────────────────
function renderTabs() {
  const container = document.getElementById('file-tabs');
  container.innerHTML = '';
  FILES.forEach(f => {
    const tab = document.createElement('div');
    tab.className = 'file-tab' +
      (currentFile?.path === f.path ? ' active' : '') +
      (modifiedFiles[f.path] ? ' modified' : '');
    tab.innerHTML = `<span class="tab-icon">${f.icon}</span>${f.name}<span class="tab-dot"></span>`;
    tab.onclick = () => openFile(f);
    container.appendChild(tab);
  });
}

// ──────────────────────────────────────────
// 파일 열기
// ──────────────────────────────────────────
async function openFile(fileInfo) {
  if (!ghConfig.token) {
    toast('먼저 ⚙ 설정에서 GitHub 토큰을 입력하세요', 'error');
    openGhModal();
    return;
  }

  // 현재 파일 변경사항 임시 저장
  if (currentFile && editor) {
    const cached = fileCache[currentFile.path];
    if (cached) {
      fileCache[currentFile.path].content = editor.getValue();
    }
  }

  currentFile = fileInfo;
  setStatus('불러오는 중...', 'saving');

  try {
    const { content } = await loadFileFromGitHub(fileInfo.path);
    editor.setValue(content);
    editor.setOption('mode', fileInfo.mode);
    editor.clearHistory();
    editor.scrollTo(0, 0);

    // 수정된 파일이면 캐시 내용으로 복원
    if (modifiedFiles[fileInfo.path] && fileCache[fileInfo.path]) {
      editor.setValue(fileCache[fileInfo.path].content);
    }

    document.getElementById('st-file').textContent = fileInfo.path;
    document.getElementById('preview-file-name').textContent = fileInfo.path;
    setStatus('준비', 'ok');
    renderTabs();
    updatePreview();
  } catch (e) {
    setStatus('오류: ' + e.message, 'error');
    toast('파일 로드 실패: ' + e.message, 'error');
  }
}

// ──────────────────────────────────────────
// 미리보기 업데이트
// ──────────────────────────────────────────
function updatePreview() {
  if (!currentFile || !editor) return;
  const frame = document.getElementById('preview-frame');
  if (currentFile.mode === 'htmlmixed') {
    const blob = new Blob([editor.getValue()], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    frame.src = url;
  } else if (currentFile.mode === 'css') {
    const html = `<!DOCTYPE html><html><head>
      <meta charset="UTF-8">
      <style>${editor.getValue()}</style>
    </head><body style="background:#fff;padding:20px;font-family:sans-serif;">
      <h2 style="color:#333">CSS 미리보기</h2>
      <p>CSS 파일은 HTML 컨텍스트 없이는 독립 미리보기가 제한됩니다.</p>
      <div class="sample-box" style="margin-top:20px">샘플 요소</div>
    </body></html>`;
    const blob = new Blob([html], { type: 'text/html' });
    frame.src = URL.createObjectURL(blob);
  } else {
    frame.src = 'about:blank';
    frame.srcdoc = `<html><body style="background:#1a1a2e;color:#aaa;font-family:monospace;padding:20px;">
      JavaScript 파일은 HTML 컨텍스트에서 확인하세요.
    </body></html>`;
  }
}

// 디바운스된 미리보기
let previewTimer = null;
function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreview, 800);
}

// ──────────────────────────────────────────
// 저장
// ──────────────────────────────────────────
async function saveFile() {
  if (!currentFile || !editor) return;
  if (!ghConfig.token) {
    toast('GitHub 토큰이 필요합니다', 'error');
    openGhModal();
    return;
  }

  const content = editor.getValue();
  const cached = fileCache[currentFile.path];
  if (!cached) { toast('파일이 아직 로드되지 않았습니다', 'error'); return; }

  document.getElementById('btn-save').disabled = true;
  setStatus('저장 중...', 'saving');

  try {
    const newSha = await saveFileToGitHub(currentFile.path, content, cached.sha);
    fileCache[currentFile.path] = { content, sha: newSha };
    delete modifiedFiles[currentFile.path];
    renderTabs();
    setStatus('저장 완료', 'ok');
    toast(`✅ ${currentFile.name} 저장 완료`, 'success');
  } catch (e) {
    setStatus('저장 실패: ' + e.message, 'error');
    toast('저장 실패: ' + e.message, 'error');
  } finally {
    document.getElementById('btn-save').disabled = false;
  }
}

// ──────────────────────────────────────────
// GitHub 커밋 & 푸시 (수정된 모든 파일)
// ──────────────────────────────────────────
async function commitAndPush() {
  const dirtyPaths = Object.keys(modifiedFiles);
  if (dirtyPaths.length === 0) {
    toast('저장되지 않은 변경사항이 없습니다', '');
    return;
  }
  if (!ghConfig.token) {
    toast('GitHub 토큰이 필요합니다', 'error');
    openGhModal();
    return;
  }

  document.getElementById('btn-commit').disabled = true;
  setStatus(`${dirtyPaths.length}개 파일 업로드 중...`, 'saving');

  let success = 0, fail = 0;
  for (const path of dirtyPaths) {
    try {
      const cached = fileCache[path];
      if (!cached) continue;
      const newSha = await saveFileToGitHub(path, cached.content, cached.sha);
      fileCache[path].sha = newSha;
      delete modifiedFiles[path];
      success++;
    } catch (e) {
      fail++;
      console.error(path, e);
    }
  }

  renderTabs();
  document.getElementById('btn-commit').disabled = false;

  if (fail === 0) {
    setStatus('GitHub 업로드 완료', 'ok');
    toast(`✅ ${success}개 파일 GitHub 업로드 완료!`, 'success');
  } else {
    setStatus(`업로드 완료 (${fail}개 실패)`, 'error');
    toast(`⚠️ ${success}개 성공, ${fail}개 실패`, 'error');
  }
}

// ──────────────────────────────────────────
// 레이아웃 전환
// ──────────────────────────────────────────
function toggleLayout() {
  const layouts = ['split', 'editor', 'preview'];
  const idx = layouts.indexOf(layout);
  layout = layouts[(idx + 1) % layouts.length];
  applyLayout();
}

function applyLayout() {
  const ep = document.getElementById('editor-panel');
  const pp = document.getElementById('preview-panel');
  const rs = document.getElementById('resizer');
  ep.classList.remove('hidden');
  pp.classList.remove('hidden');
  rs.classList.remove('hidden');
  if (layout === 'editor') {
    pp.classList.add('hidden');
    rs.classList.add('hidden');
  } else if (layout === 'preview') {
    ep.classList.add('hidden');
    rs.classList.add('hidden');
  }
  if (editor) editor.refresh();
}

// ──────────────────────────────────────────
// 리사이저 (드래그)
// ──────────────────────────────────────────
function initResizer() {
  const resizer = document.getElementById('resizer');
  const epanel  = document.getElementById('editor-panel');
  const ppanel  = document.getElementById('preview-panel');
  const main    = document.getElementById('main');
  let dragging = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = epanel.getBoundingClientRect().width;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const totalW = main.getBoundingClientRect().width;
    const newW = Math.max(200, Math.min(totalW - 200, startW + e.clientX - startX));
    epanel.style.flex = 'none';
    epanel.style.width = newW + 'px';
    ppanel.style.flex = '1';
    if (editor) editor.refresh();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

// ──────────────────────────────────────────
// 상태바 & 토스트
// ──────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('st-status');
  el.textContent = msg;
  el.className = type ? `status-${type}` : '';
}

let toastTimer = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ` ${type}` : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ──────────────────────────────────────────
// CodeMirror 초기화
// ──────────────────────────────────────────
function initEditor() {
  const ta = document.getElementById('cm-editor');
  editor = CodeMirror.fromTextArea(ta, {
    mode: 'htmlmixed',
    theme: 'material-darker',
    lineNumbers: true,
    lineWrapping: false,
    autoCloseTags: true,
    matchBrackets: true,
    tabSize: 2,
    indentWithTabs: false,
    extraKeys: {
      'Ctrl-S': () => saveFile(),
      'Cmd-S':  () => saveFile(),
    },
  });

  editor.on('change', () => {
    if (!currentFile) return;
    const cached = fileCache[currentFile.path];
    if (cached) {
      fileCache[currentFile.path].content = editor.getValue();
    }
    modifiedFiles[currentFile.path] = true;
    renderTabs();
    setStatus('수정됨', 'modified');
    schedulePreview();
  });

  editor.on('cursorActivity', () => {
    const cursor = editor.getCursor();
    document.getElementById('st-cursor').textContent =
      `Ln ${cursor.line + 1}, Col ${cursor.ch + 1}`;
  });

  // cm-wrap이 flex 컨테이너라서 CodeMirror 높이 자동 맞춤
  const wrap = document.getElementById('cm-wrap');
  const cmEl = editor.getWrapperElement();
  cmEl.style.height = '100%';
  cmEl.style.flex = '1';
  wrap.style.display = 'flex';
  wrap.style.flexDirection = 'column';
  editor.refresh();
}

// ──────────────────────────────────────────
// 초기화
// ──────────────────────────────────────────
window.addEventListener('load', () => {
  loadGhConfig();
  initEditor();
  initResizer();
  renderTabs();
  updateGhStatus();
  applyLayout();

  // 첫 파일 자동 로드
  if (ghConfig.token) {
    openFile(FILES[0]);
  } else {
    toast('⚙ 설정을 눌러 GitHub 토큰을 입력하세요', '');
    openGhModal();
  }
});

// 모달 바깥 클릭 닫기
document.getElementById('gh-modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeGhModal();
});
</script>
